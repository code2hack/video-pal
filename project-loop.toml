schema_version = 1
repository = "code2hack/video-pal"
default_branch = "main"
dry_run = true
repair_enabled = false
receipt_schema_version = 1

[protected]
branches = ["main", "master"]
paths = [".git/**", ".github/secrets/**"]

[eligibility]
ready_markers = ["ready:project-loop"]
terminal_markers = ["done", "blocked", "cancelled"]
allow_draft_prs = false

[runtime]
run_root = ".project-loop/runs"
worktree_root = ".project-loop/worktrees"
retention = "keep"

[commands]
startup = ["./init.sh"]
verification = []

[maker]
name = "codex"
runtime = "DGX Spark"

[checker]
name = "project-verifier"
config = ".codex/agents/project-verifier.toml"
required_for_stage1 = true

[budgets]
max_work_items_per_cycle = 1
max_branches_edited_per_cycle = 1
max_attempts = 3
max_commands = 20
timeout_seconds = 1800

[github]
provider = "fixture"
allowed_mutations = []
receipt_comments_enabled = false

[receipt]
schema_version = 1
